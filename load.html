<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fake loading page</title>
  </head>
  <body>
    <div id="app"></div>

    <script>
      onload = function () {
        let id = document.getElementById("app");
        let div = document.createElement("div");

        id.appendChild(div);
        div.textContent = "Halo Bang Arkan, gw cuma mo bilang";

        let load = setInterval(() => {
          div.textContent = div.textContent + ".";
        }, 1000);

        setTimeout(() => {
          clearInterval(load);
          div.textContent = "HAHAHAHAHA";
        }, 4000);
      };
    </script>
  </body>
</html>
