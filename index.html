<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arkan is the best</title>
  </head>
  <body>
    <div
      id="app"
      style="display: flex; justify-content: center; align-items: center; height: 100vh; background-color: rgb(0, 0, 0); color: royalblue; font-weight: bolder; font-size: xx-large; -webkit-text-stroke: 0.5px rgb(13, 195, 236)"
    ></div>

    <script>
      onload = function () {
        let id = document.getElementById("app");
        let div = document.createElement("div");

        id.appendChild(div);
        div.textContent = "Halo Arkan, gw cuma mo bilang";

        let load = setInterval(() => {
          div.textContent = div.textContent + ".";
        }, 1000);

        setTimeout(() => {
          clearInterval(load);
          div.textContent = "NEVER GONNA GIVE YOU UP";
        }, 5000);

        setTimeout(() => {
          clearInterval(load);
          div.textContent = "NEVER GONNA LET YOU DOWN";
        }, 7000);

        setTimeout(() => {
          clearInterval(load);
          div.textContent = "NEVER GONNA RUN AROUND...";
        }, 9000);

        setTimeout(() => {
          clearInterval(load);
          div.textContent = "AND DESERT YOU !";
        }, 11000);

        setTimeout(() => {
          clearInterval(load);
          div.textContent = "Cuma bercanda ya bang :v";
        }, 14000);
      };
    </script>
  </body>
</html>
